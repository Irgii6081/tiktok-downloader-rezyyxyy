<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔥 Rezyyxy Downloader Ultimate</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* CSS Disederhanakan untuk performa */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#eee;padding:15px;margin:0;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.box,.info-box{width:100%;max-width:600px;background:#16213e;border-radius:24px;padding:25px;box-shadow:0 15px 35px rgba(0,255,100,.1);margin-top:20px;position:relative}
.info-box{text-align:left}
h1{color:#00ff88;font-size:24px;margin:0 0 5px;text-align:center}
input{width:100%;padding:14px;background:#0f1c2e;border:2px solid #00ff88;border-radius:12px;color:#fff;box-sizing:border-box;outline:0}
.flex{display:flex;gap:10px;margin:10px 0}
.btn{padding:12px;font-weight:700;border-radius:10px;border:0;cursor:pointer;width:100%;margin:5px 0}
.b-pst{background:#00bfff;flex:1}.b-clr{background:#333;color:#fff;flex:1}.b-main{background:#00ff88;color:#000}
.res{margin-top:20px;padding:15px;background:#0f1c2e;border-radius:18px;display:none;border:1px solid #00ff88}
.mdl{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:9999;display:none;justify-content:center;align-items:center}
.mdl-c{background:#16213e;padding:20px;border-radius:15px;width:90%;max-width:400px;border:2px solid #00ff88;position:relative}
#updateContent{max-height:300px;overflow-y:auto;font-size:14px;padding-right:10px}
</style>
</head>
<body>
<div id="uMdl" class="mdl"><div class="mdl-c"><button class="mdl-x" onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute;right:10px;top:10px">X</button>
<h3 data-i18n="m_title">🔔 Info Update</h3>
<div id="updateContent">
    <p><b>v2.2.0</b><br> - Filter link TikTok diperketat (Anti-Kode HTML).<br> - Dropdown bahasa otomatis untuk seluruh teks.<br> - Info Update sekarang bisa di-scroll.</p>
</div></div></div>

<div class="box">
<div style="display:flex;justify-content:space-between;margin-bottom:15px">
<button class="btn" style="background:#222;color:#00bfff;width:auto" onclick="$('uMdl').style.display='flex'" data-i18n="btn_info">🔔 Update</button>
<select id="langSel" onchange="setLang(this.value)" class="lang-btn" style="background:#222;color:#fff;padding:5px;border-radius:8px">
<option value="id">🇮🇩 ID</option><option value="en">🇬🇧 EN</option><option value="es">🇪🇸 ES</option>
</select>
</div>
<h1>🔥 Rezyyxy Downloader</h1>
<input type="text" id="url" data-i18n-ph="placeholder" placeholder="Tempel tautan TikTok di sini...">
<div class="flex"><button class="btn b-pst" onclick="pst()" data-i18n="pst">📋 Tempel</button><button class="btn b-clr" onclick="clr()" data-i18n="clr">❌ Bersihkan</button></div>
<button id="btnCek" class="btn b-main" onclick="cek()" data-i18n="cek">🔍 CEK VIDEO</button>
<div id="res" class="res"></div>
</div>

<div class="info-box">
<h2 data-i18n="t_faq">❓ FAQ</h2>
<p data-i18n="faq_text">Kami tidak menyimpan data pribadi Anda. Sistem hanya memproses link TikTok.</p>
</div>

<script>
let $=i=>document.getElementById(i);
// Database Bahasa Lengkap
const dict={
    id:{placeholder:"Tempel tautan TikTok di sini...",pst:"📋 Tempel",clr:"❌ Bersihkan",cek:"🔍 CEK VIDEO",m_title:"🔔 Info Update",btn_info:"🔔 Info Update",t_faq:"❓ FAQ",faq_text:"Kami tidak menyimpan data pribadi Anda. Hanya link TikTok saja yang bisa diproses."},
    en:{placeholder:"Paste TikTok link here...",pst:"📋 Paste",clr:"❌ Clear",cek:"🔍 CHECK VIDEO",m_title:"🔔 Update Info",btn_info:"🔔 Update",t_faq:"❓ FAQ",faq_text:"We do not store your personal data. Only TikTok links are processed."},
    es:{placeholder:"Pega el enlace de TikTok...",pst:"📋 Pegar",clr:"❌ Borrar",cek:"🔍 BUSCAR VIDEO",m_title:"🔔 Información",btn_info:"🔔 Actualizar",t_faq:"❓ Preguntas Frecuentes",faq_text:"No guardamos sus datos personales. Solo se procesan enlaces de TikTok."}
};
let curLang=localStorage.getItem('lang')||'id';

function setLang(l){
    curLang=l; localStorage.setItem('lang',l);
    document.querySelectorAll('[data-i18n]').forEach(e=>e.innerText=dict[l][e.getAttribute('data-i18n')]);
    document.querySelectorAll('[data-i18n-ph]').forEach(e=>e.placeholder=dict[l][e.getAttribute('data-i18n-ph')]);
}

// Filter Ketat: Hanya TikTok
function validateLink(t){
    if(!t.includes('tiktok.com')){
        tst("Hanya link TikTok yang diizinkan!",1);
        return false;
    }
    return true;
}

async function pst(){
    try{
        let t = await navigator.clipboard.readText();
        if(validateLink(t)) $('url').value=t;
        else $('url').value='';
    }catch(e){tst("Gagal akses clipboard",1)}
}

function clr(){ $('url').value=''; $('res').style.display='none'; }
function tst(m,e){alert(m);} // Sederhanakan untuk contoh, gunakan fungsi toast-mu yang lama
function cek(){
    let u=$('url').value.trim();
    if(!validateLink(u)){ $('url').value=''; return; }
    // Proses cek video...
}

window.onload=()=>{ setLang(curLang); };
</script>
</body>
</html>
