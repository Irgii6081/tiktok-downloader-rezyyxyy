<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Rezyyxy TikTok Downloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: #eee;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 255, 100, 0.15);
        }
        h1 {color: #00ff88; margin-bottom: 8px; font-size: 28px;}
        
        /* Input & Utilities Layout */
        .input-group {
            position: relative;
            margin: 15px 0;
        }
        input {
            width: 100%; padding: 18px; font-size: 17px;
            background: #0f1c2e; border: 3px solid #00ff88; border-radius: 16px;
            color: #eee; box-sizing: border-box; outline: none;
        }
        .input-utilities {
            display: flex; gap: 10px; margin-top: -5px; margin-bottom: 15px;
        }
        .util-btn {
            flex: 1; padding: 10px; font-size: 14px; font-weight: 600;
            border-radius: 10px; border: none; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .paste-btn { background: #00bfff; color: #000; }
        .paste-btn:hover { background: #0099cc; }
        .clear-btn { background: #333; color: #fff; }
        .clear-btn:hover { background: #444; }

        /* Main Buttons */
        button.main-btn {
            width: 100%; padding: 18px; font-size: 18px; font-weight: 700;
            background: #00ff88; color: #000; border: none; border-radius: 16px;
            cursor: pointer; margin: 10px 0; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        button.main-btn:hover:not(:disabled) {background: #00cc6a; transform: scale(1.04);}
        button.main-btn:disabled {background: #555 !important; color: #aaa !important; cursor: not-allowed;}
        
        .music-btn {background: #ff3366 !important; color: white !important;}
        .music-btn:hover:not(:disabled) {background: #dd2255 !important;}
        
        .result {margin-top: 25px; padding: 25px; background: #0f1c2e; border-radius: 18px; display: none; border: 2px solid #00ff88;}
        video {width: 100%; max-width: 400px; border-radius: 16px; margin: 15px 0; background: #000;}
        .note {font-size: 14px; color: #ffcc00; margin: 15px 0;}
        .copyright {font-size: 13px; color: #666; margin-top: 20px;}

        /* Loading Spinner Tombol */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 0.8s linear infinite; display: none;
        }
        button:disabled .spinner {display: inline-block;}
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Notifikasi Layout */
        #toast-container {
            position: fixed; top: 20px; right: 20px;
            z-index: 9999; max-width: 360px; width: calc(100% - 40px);
            display: flex; flex-direction: column; gap: 12px;
        }
        .toast {
            background: #1f4068; color: #fff; padding: 16px 20px;
            border-radius: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; gap: 12px; text-align: left;
            transform: translateX(120%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 5px solid #00ff88; font-size: 15px;
        }
        .toast.show {transform: translateX(0);}
        .toast.info {border-left-color: #00bfff;}
        .toast.success {border-left-color: #00ff88;}
        .toast.error {border-left-color: #ff3366;}
        
        /* Progress Bar di dalam Toast */
        .toast-progress-container {
            width: 100%; margin-top: 10px;
        }
        .pg-bar {
            width: 100%; background: #0f1c2e; height: 8px; 
            border-radius: 4px; overflow: hidden; position: relative; margin-top: 5px;
        }
        .pg-fill {
            background: #00ff88; height: 100%; width: 0%; 
            transition: width 0.1s linear;
        }
        .pg-fill.indeterminate {
            width: 40%; position: absolute; background: linear-gradient(90deg, #00ff88, #00bfff);
            animation: progress-slide 1.2s infinite linear;
        }
        @keyframes progress-slide {
            0% { left: -40%; }
            100% { left: 100%; }
        }
        .toast-cancel-btn {
            background: #ff3366; color: #fff; border: none; padding: 6px 12px;
            font-size: 13px; font-weight: 700; border-radius: 8px; cursor: pointer;
            transition: 0.2s; box-shadow: 0 4px 10px rgba(255, 51, 102, 0.3);
        }
        .toast-cancel-btn:hover { background: #dd2255; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="container">
        <h1>🔥 Rezyyxy TikTok Downloader</h1>
        <p style="color:#00ff88;">Video + Musik • No Watermark</p>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste link TikTok di sini...">
        </div>

        <div class="input-utilities">
            <button class="util-btn paste-btn" onclick="pasteLink()">📋 Tempel Link</button>
            <button class="util-btn clear-btn" onclick="clearLink()">❌ Clear Link</button>
        </div>

        <button class="main-btn" onclick="processTikTok()">🔍 CEK VIDEO & MUSIK</button>

        <div id="result" class="result"></div>
        
        <div class="copyright">© Rezyyxy • All Rights Reserved 🗿</div>
    </div>

    <iframe id="download_iframe" style="display:none;"></iframe>

    <script>
        let currentVideoUrl = '';
        let currentMusicUrl = '';
        let currentTitle = '';
        let downloadController = null;

        // Toast Standar (Masuk ke bagian bawah / Mengalah)
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'ℹ️';
            if(type === 'success') icon = '✅';
            if(type === 'error') icon = '❌';

            toast.innerHTML = `<span style="font-size:20px;">${icon}</span><div>${message}</div>`;
            
            // Menggunakan appendChild agar teks info biasa muncul di bawah progress download
            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // Toast Progress Download (DI-PRIORITAS-KAN DI PALING ATAS)
        function createProgressToast(titleText) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast info`;
            toast.style.flexDirection = 'column';
            toast.style.alignItems = 'stretch';
            
            toast.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 15px;">
                    <span style="font-weight: 700;">⏳ ${titleText}</span>
                    <button class="toast-cancel-btn" onclick="cancelDownload()">BATAL</button>
                </div>
                <div class="toast-progress-container">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; color: #aaa;">
                        <span id="pgBytes">Menghubungkan...</span>
                        <span id="pgPercent">0%</span>
                    </div>
                    <div class="pg-bar">
                        <div class="pg-fill indeterminate" id="pgFill"></div>
                    </div>
                </div>
            `;
            
            // MENGGUNAKAN PREPEND: Memaksa toast download ini berada di urutan paling atas!
            container.prepend(toast);
            setTimeout(() => toast.classList.add('show'), 50);

            return {
                update: (bytesText, percent) => {
                    const txtBytes = toast.querySelector('#pgBytes');
                    const txtPercent = toast.querySelector('#pgPercent');
                    const fill = toast.querySelector('#pgFill');
                    
                    if(txtBytes) txtBytes.innerText = bytesText;
                    
                    if(percent >= 0) {
                        if(txtPercent) txtPercent.innerText = percent + '%';
                        if(fill) {
                            fill.classList.remove('indeterminate');
                            fill.style.width = percent + '%';
                        }
                    } else {
                        if(txtPercent) txtPercent.innerText = 'Proses...';
                    }
                },
                close: () => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }
            };
        }

        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    document.getElementById('urlInput').value = text;
                    showToast("Link berhasil ditempel!", "success");
                } else {
                    showToast("Klipbor kosong, salin link dulu!", "info");
                }
            } catch (err) {
                showToast("Izin klipbor ditolak browser!", "error");
            }
        }

        function clearLink() {
            document.getElementById('urlInput').value = '';
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = "none";
            resultDiv.innerHTML = '';
            currentVideoUrl = ''; currentMusicUrl = ''; currentTitle = '';
            if(downloadController) downloadController.abort();
            showToast("Kembali ke awal!", "info");
        }

        async function processTikTok() {
            let url = document.getElementById('urlInput').value.trim();
            const resultDiv = document.getElementById('result');
            if (!url) return showToast("Link mana tolol? 💀", 'error');

            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<p style="color:#00ff88;">Nyari... Sabar setan 🔥</p>`;

            try {
                const res = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if (data.data) {
                    const v = data.data;
                    currentVideoUrl = v.hdplay || v.play || '';
                    currentMusicUrl = v.music || '';
                    currentTitle = v.title || 'rezyyxy_tiktok';

                    let html = `<p style="color:#00ff88;">✅ Video ketemu!</p>
                        <video id="previewVideo" controls><source src="${currentVideoUrl}" type="video/mp4"></video>
                        <button id="btnVid" class="main-btn" onclick="downloadVideo()"><div class="spinner"></div><span class="text">⬇️ DOWNLOAD VIDEO</span></button>`;

                    if (currentMusicUrl) {
                        html += `<button id="btnMus" class="main-btn music-btn" onclick="downloadMusic()"><div class="spinner"></div><span class="text">🎵 DOWNLOAD MUSIK</span></button>`;
                    }

                    html += `<p class="note">${currentTitle}</p>`;
                    resultDiv.innerHTML = html;
                    showToast("Video berhasil dimuat!", "success");
                } else {
                    resultDiv.innerHTML = `<p>Video kagak ketemu. Link-nya bener gakk?</p>`;
                    showToast("Video tidak ditemukan!", "error");
                }
            } catch(e) {
                resultDiv.innerHTML = `<p>API rewel. Coba lagi kontol.</p>`;
                showToast("Gagal menyambung ke API!", "error");
            }
        }

        async function forceDownload(fileUrl, fileName, onProgress) {
            downloadController = new AbortController();
            const signal = downloadController.signal;

            try {
                const response = await fetch(fileUrl, { signal });
                if (!response.ok) throw new Error('Network error');

                const contentLength = response.headers.get('content-length');
                const totalBytes = parseInt(contentLength, 10) || 0;

                const reader = response.body.getReader();
                let receivedBytes = 0;
                let chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    chunks.push(value);
                    receivedBytes += value.length;

                    if (onProgress) {
                        onProgress(receivedBytes, totalBytes);
                    }
                }

                let chunksAll = new Uint8Array(receivedBytes);
                let position = 0;
                for (let chunk of chunks) {
                    chunksAll.set(chunk, position);
                    position += chunk.length;
                }

                const blob = new Blob([chunksAll]);
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                return 'sukses';
            } catch (error) {
                if (error.name === 'AbortError') return 'dibatalkan';
                
                console.warn("Stream blocked by CORS, using silent iframe strategy...");
                const iframe = document.getElementById('download_iframe');
                let downloadUrl = fileUrl;
                if (!downloadUrl.includes('hd=1') && fileUrl.includes('tikwm.com')) {
                    downloadUrl = fileUrl + '&attachments=1'; 
                }
                iframe.src = downloadUrl;
                return 'sukses';
            }
        }

        function cancelDownload() {
            if (downloadController) {
                downloadController.abort();
            }
        }

        async function downloadVideo() {
            if (!currentVideoUrl) return showToast("Ga ada video 💀", "error");
            const btn = document.getElementById('btnVid');
            const btnText = btn.querySelector('.text');
            
            btn.disabled = true;
            btnText.innerText = "Mengunduh...";
            
            // Ini akan muncul paling atas
            const pToast = createProgressToast("Ngunduh Video");
            // Ini akan mengalah muncul di bawah pToast
            showToast("Memulai unduhan video...", "info");

            const safeName = currentTitle.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30) + '.mp4';
            
            const status = await forceDownload(currentVideoUrl, safeName, (received, total) => {
                const MBDownloaded = (received / 1024 / 1024).toFixed(1);
                if (total > 0) {
                    const percent = Math.round((received / total) * 100);
                    pToast.update(`${MBDownloaded} MB`, percent);
                } else {
                    pToast.update(`${MBDownloaded} MB..`, -1);
                }
            });
            
            pToast.close();
            btn.disabled = false;
            btnText.innerText = "⬇️ DOWNLOAD VIDEO";
            
            if (status === 'sukses') {
                showToast("Video berhasil diunduh! Selesai asu! 🖕", "success");
            } else if (status === 'dibatalkan') {
                showToast("Unduhan dibatalkan!", "error");
            }
        }

        async function downloadMusic() {
            if (!currentMusicUrl) return showToast("Ga ada musik 💀", "error");
            const btn = document.getElementById('btnMus');
            const btnText = btn.querySelector('.text');
            
            btn.disabled = true;
            btnText.innerText = "Mengunduh...";
            
            // Ini akan muncul paling atas
            const pToast = createProgressToast("Mengekstrak Musik");
            // Ini akan mengalah muncul di bawah pToast
            showToast("Memulai unduhan audio...", "info");

            const safeName = currentTitle.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30) + '.mp3';
            
            const status = await forceDownload(currentMusicUrl, safeName, (received, total) => {
                const MBDownloaded = (received / 1024 / 1024).toFixed(1);
                if (total > 0) {
                    const percent = Math.round((received / total) * 100);
                    pToast.update(`${MBDownloaded} MB`, percent);
                } else {
                    pToast.update(`${MBDownloaded} MB..`, -1);
                }
            });
            
            pToast.close();
            btn.disabled = false;
            btnText.innerText = "🎵 DOWNLOAD MUSIK";
            
            if (status === 'sukses') {
                showToast("Musik berhasil disimpan! 🔥", "success");
            } else if (status === 'dibatalkan') {
                showToast("Unduhan musik dibatalkan!", "error");
            }
        }
    </script>
</body>
</html>
