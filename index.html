<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Rezyyxy TikTok Downloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {font-family: 'Inter', Arial, sans-serif;background: linear-gradient(135deg, #0a0a0a, #1a1a2e);color: #eee;text-align: center;padding: 20px;margin: 0;min-height: 100vh;}
        .container {max-width: 480px;margin: 0 auto;background: #16213e;border-radius: 24px;padding: 30px;box-shadow: 0 15px 40px rgba(0, 255, 100, 0.15);}
        h1 {color: #00ff88;margin-bottom: 8px;font-size: 28px;}
        input {width: 100%;padding: 18px;margin: 15px 0;font-size: 17px;background: #0f1c2e;border: 3px solid #00ff88;border-radius: 16px;color: #eee;box-sizing: border-box;}
        button {width: 100%;padding: 18px;font-size: 18px;font-weight: 700;background: #00ff88;color: #000;border: none;border-radius: 16px;cursor: pointer;margin: 10px 0;transition: 0.3s;}
        button:hover {background: #00cc6a;transform: scale(1.04);}
        .music-btn {background: #ff3366 !important;color: white !important;}
        .result {margin-top: 25px;padding: 25px;background: #0f1c2e;border-radius: 18px;display: none;border: 2px solid #00ff88;}
        video {width: 100%;max-width: 400px;border-radius: 16px;margin: 15px 0;background: #000;}
        .note {font-size: 14px;color: #ffcc00;margin: 15px 0;}
        .copyright {font-size: 13px;color: #666;margin-top: 20px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Rezyyxy TikTok Downloader</h1>
        <p style="color:#00ff88;">Video + Musik • No Watermark</p>
        
        <input type="text" id="urlInput" placeholder="Paste link TikTok di sini...">
        <button onclick="processTikTok()">🔍 CEK VIDEO & MUSIK</button>

        <div id="result" class="result"></div>
        
        <div class="copyright">© Rezyyxy • All Rights Reserved 🗿</div>
    </div>

    <script>
        async function processTikTok() {
            let url = document.getElementById('urlInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!url) {
                alert("Link TikTok mana tolol? Kosong mulu kontol 💀");
                return;
            }

            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<p style="color:#00ff88;">Nyari video & musik... Sabar setan 🔥</p>`;

            try {
                const res = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (data.data) {
                    const v = data.data;
                    const videoUrl = v.hdplay || v.play;
                    const musicUrl = v.music || '';

                    let html = `
                        <p style="color:#00ff88;">✅ Video ketemu bro!</p>
                        <video controls><source src="${videoUrl}" type="video/mp4"></video>
                        <button onclick="downloadVideo('\( {videoUrl}', ' \){v.title || 'tiktok'}')">⬇️ DOWNLOAD VIDEO</button>
                    `;

                    if (musicUrl) {
                        html += `
                            <button class="music-btn" onclick="downloadMusic('\( {musicUrl}', ' \){v.title || 'rezyyxy_music'}')">🎵 DOWNLOAD MUSIK SAJA</button>
                        `;
                    }

                    html += `<p class="note">${v.title || 'Ga ada judul'}</p>`;
                    resultDiv.innerHTML = html;
                } else {
                    throw new Error("Gagal");
                }
            } catch(e) {
                resultDiv.innerHTML = `
                    <p style="color:#ff3366;">API rewel anjir. Coba manual:</p>
                    <a href="https://tikwm.com/?url=${encodeURIComponent(url)}" target="_blank"><button>BUKA TIKWM.COM</button></a>
                `;
            }
        }

        function downloadVideo(videoUrl, title) {
            const a = document.createElement('a');
            a.href = videoUrl;
            a.download = title.replace(/[^a-zA-Z0-9]/g, '_') + '.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert("Video download jalan asu! 😂🖕");
        }

        function downloadMusic(musicUrl, title) {
            const a = document.createElement('a');
            a.href = musicUrl;
            a.download = title.replace(/[^a-zA-Z0-9]/g, '_') + '.mp3';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert("Musik Rezyyxy style jalan kontol! 🔥🗿");
        }
    </script>
</body>
</html>
